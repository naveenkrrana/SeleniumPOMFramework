plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // Selenium WebDriver
    implementation 'org.seleniumhq.selenium:selenium-java:4.18.1'

    // TestNG for assertions and test execution
    testImplementation 'org.testng:testng:7.9.0'

    // Silences the SLF4J missing logger warnings generated by Selenium
    testImplementation 'org.slf4j:slf4j-simple:2.0.13'

    // ExtentReports for custom HTML reporting
    implementation 'com.aventstack:extentreports:5.1.1'

    // Cucumber BDD Engine
    implementation 'io.cucumber:cucumber-java:7.15.0'
    implementation 'io.cucumber:cucumber-testng:7.15.0'

    // RestAssured for API Testing
    implementation 'io.rest-assured:rest-assured:5.4.0'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.16.1'

    // Apache POI for Excel Data-Driven Testing
    implementation 'org.apache.poi:poi:5.4.0'
    implementation 'org.apache.poi:poi-ooxml:5.4.0'

    // JDBC and H2 In-Memory Database for SQL Testing
    implementation 'com.h2database:h2:2.2.224'
    implementation 'org.springframework:spring-jdbc:6.1.4'
}

test {
    useTestNG() {
        // Point Gradle directly to our TestNG suite configuration
        suites 'src/test/resources/testng.xml'
    }

    // Ensure System.out.println output is visible in the build terminal
    testLogging {
        showStandardStreams = true
    }

    reports.html.required = false     // Disables the redundant Gradle HTML report
    reports.junitXml.required = false // Disables the XML report
}